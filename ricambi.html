<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ORMA - Ricambi e Parti di Ricambio</title>
  <meta name="description" content="Ordina ricambi e parti di ricambio per elettrodomestici. Invia il codice del modello, foto e descrizione via WhatsApp: ti aiutiamo a trovare e spedire il pezzo giusto a casa tua.">
  <style>
    :root {
      --dark: #0f172a;
      --card: #1e293b;
      --accent: #2563eb;
      --white: #fff;
      --muted: #94a3b8;
      --border: rgba(255,255,255,0.06);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background:var(--dark);
      color:var(--white);
      line-height:1.6;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* NAV */
    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 20px;
      border-bottom:1px solid var(--border);
      background:rgba(0,0,0,0.06);
      position:sticky;
      top:0;
      z-index:50;
      backdrop-filter: blur(4px);
    }

    /* logo aggiornato: sigla + descrizione */
    .nav-logo{
      display:flex;
      align-items:baseline;
      gap:8px;
      font-weight:900;
      letter-spacing:2px;
      font-size:1.05rem;
      color: var(--accent);
    }
    .nav-logo .brand{
      color:var(--accent);
      font-size:1.15rem;
      line-height:1;
    }
    .nav-logo .brand-sub{
      color:var(--muted);
      font-weight:700;
      font-size:0.82rem;
      opacity:0.95;
      white-space:nowrap;
    }
    @media(max-width:420px){
      .nav-logo{gap:6px}
      .nav-logo .brand{font-size:1rem}
      .nav-logo .brand-sub{font-size:0.72rem}
    }

    .nav-links{display:flex;gap:1rem;align-items:center;margin:0 auto} /* centrato */
    .nav-links a{
      color:var(--muted);
      text-decoration:none;
      font-size:0.95rem;
      padding:6px 8px;
      border-radius:6px;
    }
    .nav-links a:hover{color:var(--white); background: rgba(255,255,255,0.02)}
    .nav-links a.active{color:var(--accent); font-weight:700}

    .nav-cta {
      background: var(--accent);
      color: var(--white);
      padding: 8px 12px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      margin-left: 16px;
      display: inline-block;
    }
    .nav-cta:hover { opacity: 0.95; }

    /* LAYOUT */
    .container{max-width:1000px;margin:28px auto;padding:0 20px}
    .section-label{color:var(--accent);font-weight:700;text-transform:uppercase;font-size:0.8rem;margin-bottom:8px}
    h1{font-size:2rem;margin-bottom:8px}
    p.lead{color:var(--muted);margin-bottom:18px}

    /* CARD */
    .card{
      background:var(--card);
      padding:18px;
      border-radius:12px;
      border:1px solid var(--border);
      margin-bottom:16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }

    /* STEPS - miglioramento estetico /
    .steps{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
      margin:18px 0;
      align-items:start;
    }
    .step{
      background:linear-gradient(180deg, rgba(255,255,255,0.01), transparent);
      padding:18px;
      border-radius:12px;
      border:1px solid var(--border);
      display:flex;
      gap:12px;
      align-items:flex-start;
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .step:hover{ transform: translateY(-6px); box-shadow: 0 10px 24px rgba(0,0,0,0.45); }
    .step-badge{
      min-width:48px;
      height:48px;
      border-radius:10px;
      background:rgba(37,99,235,0.12);
      color:var(--accent);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
